<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LaundryGo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #eef2f3;
        }

        .container {
            width: 400px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px #bbb;
        }

        h2 {
            text-align: center;
        }

        input, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 10px;
            color: #28a745;
        }

        /* Styling for the custom error alert box */
        .alert {
            display: none; /* Hidden by default */
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            background-color: #f44336; /* Red color */
            color: white;
            padding: 15px;
            border-radius: 5px;
            font-size: 16px;
            text-align: center;
            width: 80%;
            max-width: 400px;
            z-index: 1000;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.3);
        }

        .alert.show {
            display: block; /* Show the alert box */
        }

        .alert button {
            background-color: #ff0000;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
        }

        .alert button:hover {
            background-color: #cc0000;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Login</h2>
    <form action="login.php" method="POST">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
        <a href="signup.html">Don't have an account? Sign up</a>
    </form>
</div>

<!-- Custom Alert Box -->
<div id="errorAlert" class="alert">
    <span id="errorMessage"></span>
    <button onclick="closeAlert()">Close</button>
</div>

<script>
    // Check for error messages in the URL
    const urlParams = new URLSearchParams(window.location.search);
    const errorMessage = urlParams.get('error');  // Get error message from URL (if exists)

    if (errorMessage) {
        showAlert(errorMessage);
    }

    // Function to display the custom alert box
    function showAlert(message) {
        const alertBox = document.getElementById('errorAlert');
        const errorMessageElem = document.getElementById('errorMessage');

        errorMessageElem.textContent = message;
        alertBox.classList.add('show');  // Display the alert
    }

    // Function to close the alert box
    function closeAlert() {
        const alertBox = document.getElementById('errorAlert');
        alertBox.classList.remove('show');  // Hide the alert
    }
</script>

</body>
</html>
